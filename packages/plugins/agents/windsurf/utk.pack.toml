[pack]
name = "utk-windsurf-agent"
version = "0.1.0"
description = "UTK extension pack for Windsurf agent integrations."
license = "MIT"
homepage = "https://github.com/Tyler-R-Kendrick/universal-token-killer"
keywords = ["windsurf", "agent", "utk"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "agent"
id = "utk-windsurf"
target = "windsurf"
path = "extensions"

