[pack]
name = "utk-opencode-agent"
version = "0.1.0"
description = "UTK extension pack for OpenCode agent integrations."
license = "MIT"
homepage = "https://github.com/Tyler-R-Kendrick/universal-token-killer"
keywords = ["opencode", "agent", "utk"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "agent"
id = "utk-opencode"
target = "opencode"
path = "extensions"

