[pack]
name = "utk-cli"
version = "0.1.0"
description = "GitHub Copilot plugin for UTK CLI workflows."
license = "MIT"
homepage = "https://github.com/Tyler-R-Kendrick/universal-token-killer"
keywords = ["github-copilot", "utk", "agentskills"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "agent"
id = "utk-cli"
target = "copilot"
path = "."
manifest = "plugin.json"

