[pack]
name = "utk-model-proxy"
version = "0.1.0"
description = "GitHub Copilot plugin for the UTK model proxy."
license = "MIT"
homepage = "https://github.com/Tyler-R-Kendrick/universal-token-killer"
keywords = ["github-copilot", "model-proxy", "utk"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "agent"
id = "utk-model-proxy"
target = "copilot"
path = "."
manifest = "plugin.json"

