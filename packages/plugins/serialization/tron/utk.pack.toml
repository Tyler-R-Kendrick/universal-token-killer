[pack]
name = "tron"
version = "1.0.0"
description = "UTK TRON serialization plugin."
license = "MIT"
keywords = ["serialization", "tron", "utk"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "serialization"
id = "tron"
module = "index.cjs"
grammar = "grammar/tron.lark"
extension = "tron"

