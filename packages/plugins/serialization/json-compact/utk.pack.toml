[pack]
name = "json-compact"
version = "1.0.0"
description = "UTK compact JSON serialization plugin."
license = "MIT"
keywords = ["serialization", "json", "utk"]

[compatibility]
utk = ">=0.1.0"
pack_spec = "2"

[[plugins]]
type = "serialization"
id = "json-compact"
symbol = "JSON_COMPACT_SERIALIZER"
semantics = "json-value-v1"
grammar = "grammar/json-compact.lark"
extension = "json"
aliases = ["compressed-json"]
canonical = true
