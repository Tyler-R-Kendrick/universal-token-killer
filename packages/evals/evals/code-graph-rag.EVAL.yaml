tests:
  - id: barrel-export-definition
    input:
      - role: user
        content: "Resolve a symbol through a public barrel export without returning raw source bodies."
    expected_output: |
      {
        "scenario": "barrel-export-definition",
        "query": "makeWidget",
        "expected_symbol": {
          "name": "makeWidget",
          "filePath": "src/widgetService.ts",
          "kind": "function"
        },
        "serena_baseline_tokens": 160,
        "forbidden_snippets": [
          "return { id: config.id"
        ]
      }
    assertions:
      - name: code-graph-rag
        type: code-grader
        command: ["node", "packages/evals/dist/graders/codeGraphRagCodeGrader.js"]
