tests:
  - id: tool-output-large-json-gemfilter
    input:
      - role: user
        content: "Compress large JSON tool output while retaining route and failed event."
    expected_output: |
      {
        "scenario": "tool-output-large-json-gemfilter",
        "tool_id": "compresr.tool.large-json",
        "required_facts": [
          {
            "kind": "jsonPath",
            "path": "$.route",
            "expected": "tool-output"
          },
          {
            "kind": "jsonPath",
            "path": "$.events[23].status",
            "expected": "failed"
          }
        ],
        "compresr_baseline_text": "Compresr gemfilter keeps query-relevant failed event, route=tool-output, event evt-23 failed, shadow ref for full JSON.",
        "compresr_baseline_tokens": 30,
        "min_fact_score": 1,
        "install_config": {
          "pythonPackage": "compresr",
          "installedVersion": "2.5.1",
          "installCommand": "python -m pip install --user compresr==2.5.1",
          "apiKeyEnvVar": "COMPRESR_API_KEY",
          "liveApiMode": "disabled-without-api-key",
          "baselineMode": "deterministic-installed-sdk-model-baselines",
          "models": [
            "espresso_v1",
            "latte_v1",
            "agentic_history_lingua",
            "agentic_tool_output_gemfilter",
            "agentic_tool_output_lingua",
            "agentic_tool_discovery_sat"
          ],
          "endpoints": [
            "/api/compress/question-agnostic/",
            "/api/compress/question-specific/",
            "/api/compress/question-agnostic/batch",
            "/api/compress/question-specific/batch"
          ]
        }
      }
    assertions:
      - name: compresr-parity
        type: code-grader
        command: ["node", "packages/evals/dist/graders/compresrParityCodeGrader.js"]
